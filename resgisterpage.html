<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
</head>
<body id="registerPage">
    <a href="index.html">Home</a>
    <h3>Register</h3>
    <form action="/register" method="post">
        <label for="firstname" placeholder="Enter your first name">First Name:</label>
        <input type="text" id="firstname" name="firstname" required><br><br>

        <label for="lastname" placeholder="Enter your last name">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required><br><br>

        <label for="email" placeholder="Enter your email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password" placeholder="Enter your password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <label for="confirm_password" placeholder="Confirm your password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>
        <label for="login_link">If you have an account, <a href="/login">Login here</a></label><br><br>

        <label for="role">Role:</label>
        <select id="role" name="role" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select><br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="whatsapp">WhatsApp Number:</label>
        <input type="tel" id="whatsapp" name="whatsapp" required><br><br>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required><br><br>
        
        <label for="country">Country:</label>
        <input type="text" id="country" name="country" required><br><br>
        <select id="country" name="country" required>
            <option value="ethiopia">Ethiopia</option>
            <option value="sudan">Sudan</option>
            <option value="south sudan">South Sudan</option>
            <option value="kenya">Kenya</option>
            <option value="usa">USA</option>
        </select><br><br>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
        <button  id="registerButton" type="button">Register</button>

    </form>
    
</body>
</html>
